<body>
<div class="app" id="app"></div>
<div class="pov" id="pov"><div class="psh">
<div class="phd"><button class="pcn" id="pcn">Cancel</button><div class="ptt" id="ptt">Edit</div><button class="pdn" id="pdn">Done</button></div>

</div></div>
<script>
/*VS*/
var V=[{name:"Trikeri",vlsfo:900,commission:5,seaMargin:4,bSpeed:12,bCons:17,lSpeed:11.5,lCons:19.5,portCons:2.7,intakeShow:false,intakePrice:35,intakeDelta:0,dop:false,preset:null,ecoFull:"eco",p6Used:false,options:[{name:"PMO ECSA Feast",hire:18250,bb:null,bbOverride:false,bDist:7850,lDist:11400,portDays:15,offhire:0}]}];
/*VE*/
var AT=0,PK={},US=[],RS=[],UG=false,isAbout=false;
var VF=["vlsfo","commission","seaMargin","bSpeed","bCons","lSpeed","lCons","portCons","intakePrice","intakeDelta"];
var CF={vlsfo:{w:4,f:0},commission:{w:1,f:2},seaMargin:{w:1,f:1},bSpeed:{w:2,f:2},lSpeed:{w:2,f:2},bCons:{w:2,f:2},lCons:{w:2,f:2},portCons:{w:2,f:2},hire:{w:5,f:0},bb:{w:7,f:0},bDist:{w:5,f:0},lDist:{w:5,f:0},portDays:{w:2,f:1},intakePrice:{w:3,f:0},intakeDelta:{w:4,f:0},offhire:{w:2,f:1}};
var PR={bki:{name:"Tess82",pc:3.5,eco:{bs:12.5,bc:23,ls:11.5,lc:22},full:{bs:14,bc:31,ls:13.5,lc:33}},sungd:{name:"Sungdong_81",pc:4,eco:{bs:12.25,bc:22,ls:12,lc:24.5},full:{bs:14,bc:29.75,ls:13,lc:30.25}},dacks:{name:"Dacks_82",pc:3.5,eco:{bs:12.5,bc:18,ls:11.5,lc:19.5},full:{bs:14,bc:24,ls:13.5,lc:28.5}}};

function aBB(h){return(h-10000)*100}
function gBB(o){return o.bbOverride?o.bb:aBB(o.hire)}
function fm(n,d){d=d||0;if(n==null||isNaN(n))return"\u2014";return Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}
function fD(n){return(n==null||isNaN(n))?"\u2014":Number(n).toFixed(1)}
function f2(n){return(n==null||isNaN(n))?"\u2014":Number(n).toFixed(2)}
function es(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;")}
function iV(v){return(v.intakeShow&&v.intakeDelta&&v.intakePrice)?(v.intakeDelta*v.intakePrice):0}
function cc(a,b){return a>b+.5?"up":a<b-.5?"dn":""}
function sU(){if(UG)return;US.push(JSON.stringify(V));if(US.length>30)US.shift();RS=[]}
function doU(){if(US.length<2)return;UG=true;RS.push(US.pop());V=JSON.parse(US[US.length-1]);AT=Math.min(AT,V.length-1);render();UG=false}
function doR(){if(RS.length<1)return;UG=true;var s=RS.pop();US.push(s);V=JSON.parse(s);AT=Math.min(AT,V.length-1);render();UG=false}
function aP(vi,k){var v=V[vi],p=PR[k],m=v.ecoFull||"eco",s=p[m];v.preset=k;v.name=p.name;v.portCons=p.pc;v.bSpeed=s.bs;v.bCons=s.bc;v.lSpeed=s.ls;v.lCons=s.lc;render()}
function tEF(vi,m){V[vi].ecoFull=m;var v=V[vi];if(v.preset&&PR[v.preset]){var s=PR[v.preset][m];v.bSpeed=s.bs;v.bCons=s.bc;v.lSpeed=s.ls;v.lCons=s.lc}render()}

function solveEF(vi,oi){
  var v=V[vi],p=v.preset?PR[v.preset]:null;
  if(!p)return;
  var o=v.options[oi],cm=v.commission/100,sm=1+v.seaMargin/100,vl=v.vlsfo,pD=o.portDays,dp=!!v.dop;
  var bD_e=(o.bDist/(p.eco.bs*24))*sm,lD_e=(o.lDist/(p.eco.ls*24))*sm;
  var bD_f=(o.bDist/(p.full.bs*24))*sm,lD_f=(o.lDist/(p.full.ls*24))*sm;
  var newH;
  if(dp){var numr=vl*(bD_f*p.full.bc+lD_f*p.full.lc-bD_e*p.eco.bc-lD_e*p.eco.lc);var denm=(1-cm)*(bD_e+lD_e-bD_f-lD_f);if(Math.abs(denm)<0.001)return;newH=Math.round(numr/denm)}
  else{var numr=vl*(lD_f*p.full.lc-lD_e*p.eco.lc);var denm=(1-cm)*(lD_e-lD_f);if(Math.abs(denm)<0.001)return;newH=Math.round(numr/denm)}
  var oldH=o.hire,oldBB=o.bb,oldBBO=o.bbOverride;
  o.hire=newH;o.bbOverride=false;o.bb=null;render();
  flashMob(function(){o.hire=oldH;o.bb=oldBB;o.bbOverride=oldBBO;render()},"Hire");
}

function solveBF(vi,oi){
  var v=V[vi],p=v.preset?PR[v.preset]:null;
  if(!p)return;
  var o=v.options[oi],cm=v.commission/100,sm=1+v.seaMargin/100,dp=!!v.dop;
  var bD_e=(o.bDist/(p.eco.bs*24))*sm,lD_e=(o.lDist/(p.eco.ls*24))*sm;
  var bD_f=(o.bDist/(p.full.bs*24))*sm,lD_f=(o.lDist/(p.full.ls*24))*sm;
  var newB;
  if(dp){var numr=o.hire*(1-cm)*(bD_e+lD_e-bD_f-lD_f);var denm=(bD_f*p.full.bc+lD_f*p.full.lc)-(bD_e*p.eco.bc+lD_e*p.eco.lc);if(Math.abs(denm)<0.001)return;newB=Math.round(numr/denm)}
  else{var numr=o.hire*(1-cm)*(lD_e-lD_f);var denm=(lD_f*p.full.lc)-(lD_e*p.eco.lc);if(Math.abs(denm)<0.001)return;newB=Math.round(numr/denm)}
  var oldB=v.vlsfo;
  v.vlsfo=newB;render();
  flashMob(function(){v.vlsfo=oldB;render()},"Bunk $/mt");
}

var flashTimer=null;
function flashMob(revertFn,label){
  if(flashTimer)clearTimeout(flashTimer);
  // Find the card by label text
  var cards=document.querySelectorAll('.f');
  var target=null;
  cards.forEach(function(c){var fl=c.querySelector('.fl');if(fl&&fl.textContent.trim().toUpperCase()===label.toUpperCase())target=c});
  if(target){
    var count=0;
    var iv=setInterval(function(){
      target.style.background=(count%2===0)?'rgba(212,168,83,.25)':'rgba(224,122,95,.2)';
      count++;
      if(count>=12){clearInterval(iv);target.style.background=''}
    },500);
  }
  flashTimer=setTimeout(function(){revertFn()},6000);
}

function calc(o,v){
  var c=v.commission/100,s=1+v.seaMargin/100,dp=!!v.dop,bb=dp?0:gBB(o);
  var bSpd=v.bSpeed,lSpd=v.lSpeed,bCn=v.bCons,lCn=v.lCons;
  if(isAbout){bSpd=Math.max(0.1,bSpd-0.5);lSpd=Math.max(0.1,lSpd-0.5);bCn=bCn*1.05;lCn=lCn*1.05}
  var bD=(o.bDist/(bSpd*24))*s,lD=(o.lDist/(lSpd*24))*s,pD=o.portDays,oh=o.offhire||0;
  var oH=dp?(bD+lD+pD):(lD+pD),tot=bD+lD+pD+oh;
  var dB=bCn*v.vlsfo,dL=lCn*v.vlsfo,dP=v.portCons*v.vlsfo;
  var bB=bD*dB,lB=lD*dL,pB=pD*dP,ohB=oh*dP,tB=bB+lB+pB+ohB;
  var nH=o.hire*(1-c),nBB=dp?0:(bb*(1-c)),hR=oH*nH;
  var vN=dp?(hR-ohB):(hR+nBB-bB-ohB),nT=vN/tot,gT=nT/(1-c);
  var cP=dp?(hR+tB-ohB):(hR+nBB+lB+pB);
  var iv=iV(v),aCP=cP-iv;
  return{bD:bD,lD:lD,pD:pD,oh:oh,ohB:ohB,oH:oH,tot:tot,bB:bB,lB:lB,pB:pB,tB:tB,dB:dB,dL:dL,dP:dP,nH:nH,nBB:nBB,bb:bb,hR:hR,vN:vN,nT:nT,gT:gT,cP:cP,iv:iv,aCP:aCP,dp:dp}
}

  var vt=V[ti],op=vt.options[to],cm=vt.commission/100,sm=1+vt.seaMargin/100;

  if(isAbout){bSpd=Math.max(0.1,bSpd-0.5);lSpd=Math.max(0.1,lSpd-0.5);bCn=bCn*1.05;lCn=lCn*1.05}
  var bD=(op.bDist/(bSpd*24))*sm,lD=(op.lDist/(lSpd*24))*sm,pD=op.portDays,lB=lD*lCn*vt.vlsfo;
  if(vt.dop){var oH=bD+lD+pD,bB=bD*bCn*vt.vlsfo,pB=pD*vt.portCons*vt.vlsfo,tB=bB+lB+pB;op.hire=Math.round((tCP-tB)/(oH*(1-cm)))}
  else{var oH=lD+pD,pB=pD*vt.portCons*vt.vlsfo;op.hire=Math.round(((tCP-lB-pB)/(1-cm)+1000000)/(oH+100))}

}

// Wheel Picker - supports range, two-column, and digit modes
var RANGE={
  bSpeed:{type:"dual",wMin:10,wMax:15,wStep:1,dMin:0,dMax:95,dStep:5},
  lSpeed:{type:"dual",wMin:10,wMax:15,wStep:1,dMin:0,dMax:95,dStep:5},
  bCons:{type:"dual",wMin:10,wMax:40,wStep:1,dMin:0,dMax:95,dStep:5},
  lCons:{type:"dual",wMin:10,wMax:40,wStep:1,dMin:0,dMax:95,dStep:5},
  portCons:{type:"dual",wMin:1,wMax:10,wStep:1,dMin:0,dMax:95,dStep:5},
  hire:{type:"range",min:0,max:50000,step:50},
  bDist:{type:"range",min:0,max:15000,step:50},
  lDist:{type:"range",min:0,max:15000,step:50},
  bb:{type:"range",min:0,max:5000000,step:5000},
  intakePrice:{type:"range",min:0,max:100,step:1},
  intakeDelta:{type:"range",min:0,max:5000,step:100},
  commission:{type:"rangef",vals:[]},
  seaMargin:{type:"rangef",vals:[]}
};
// Build commission values: 0.00, 0.25, 0.50, ... 15.00
for(var c=0;c<=1500;c+=25)RANGE.commission.vals.push(c/100);
// Build seaMargin values: 0.0, 0.5, 1.0, ... 20.0
for(var s=0;s<=200;s+=5)RANGE.seaMargin.vals.push(s/10);

function openP(label,field,val,vi,oi){
  PK={vi:vi,oi:oi,field:field,wheels:[],neg:false};
  document.getElementById("ptt").textContent=label;
  var isNeg=(field==="intakeDelta"&&val<0);
  var av=Math.abs(val);
  var bd=document.getElementById("pbd");bd.innerHTML="";PK.wheels=[];PK.neg=!!isNeg;
  var r=RANGE[field];
  if(r&&r.type==="range"){
    if(field==="intakeDelta"){buildSign(bd,isNeg,field,av)}
    buildRange(bd,r.min,r.max,r.step,av);
  }
  else if(r&&r.type==="rangef"){
    var closest=0,diff=1e9;for(var i=0;i<r.vals.length;i++){if(Math.abs(r.vals[i]-av)<diff){diff=Math.abs(r.vals[i]-av);closest=i}}
    mkRange(bd,r.vals,closest,80);
  }
  else if(r&&r.type==="dual"){buildDual(bd,r,av)}
  else{
    // Sign toggle for intakeDelta
    if(field==="intakeDelta"){buildSign(bd,isNeg,field,av)}
    // Digit wheels fallback
    var cfg=CF[field]||{w:5,f:0},w=cfg.w,f=cfg.f;
    var mult=Math.pow(10,f),iv=Math.round(av*mult),wp=Math.floor(iv/mult),fp=iv%mult;
    var ws=String(wp).padStart(w,"0"),fs=f>0?String(fp).padStart(f,"0"):"";
    for(var i=0;i<w;i++)mkDigit(bd,parseInt(ws[i]));
    if(f>0){var dot=document.createElement("div");dot.className="pdot";dot.textContent=".";bd.appendChild(dot)}
    for(var i=0;i<f;i++)mkDigit(bd,parseInt(fs[i]));
  }
  document.getElementById("pov").classList.add("show");updPV();
}

function buildRange(ct,min,max,step,val){
  var vals=[];for(var v=min;v<=max;v+=step)vals.push(v);
  var closest=0,diff=1e9;for(var i=0;i<vals.length;i++){if(Math.abs(vals[i]-val)<diff){diff=Math.abs(vals[i]-val);closest=i}}
  mkRange(ct,vals,closest,80);
}

function buildDual(ct,r,val){
  var wv=Math.floor(val),dv=Math.round((val-wv)*100);
  // Snap decimal to nearest step
  dv=Math.round(dv/r.dStep)*r.dStep;if(dv>=100){wv++;dv=0}
  // Whole column
  var wVals=[];for(var v=r.wMin;v<=r.wMax;v+=r.wStep)wVals.push(v);
  var wIdx=0;for(var i=0;i<wVals.length;i++){if(wVals[i]===wv)wIdx=i}
  mkRange(ct,wVals,wIdx,70);
  // Dot
  var dot=document.createElement("div");dot.className="pdot";dot.textContent=".";ct.appendChild(dot);
  // Decimal column
  var dVals=[];for(var v=r.dMin;v<=r.dMax;v+=r.dStep)dVals.push(v);
  var dIdx=0;for(var i=0;i<dVals.length;i++){if(dVals[i]===dv)dIdx=i}
  mkRange(ct,dVals,dIdx,70);
}

function mkRange(ct,vals,selIdx,w){
  var col=document.createElement("div");col.className="wc";col.style.maxWidth=w+"px";
  var hl=document.createElement("div");hl.className="whl";
  var mt=document.createElement("div");mt.className="wmt t";
  var mb=document.createElement("div");mb.className="wmt b";
  var sc=document.createElement("div");sc.className="ws";
  // Padding
  for(var p=0;p<2;p++){var pad=document.createElement("div");pad.className="wi";sc.appendChild(pad)}
  for(var i=0;i<vals.length;i++){
    var it=document.createElement("div");it.className="wi"+(i===selIdx?" sel":"");
    it.textContent=vals[i];it.dataset.idx=i;sc.appendChild(it);
  }
  for(var p=0;p<2;p++){var pad=document.createElement("div");pad.className="wi";sc.appendChild(pad)}
  col.appendChild(hl);col.appendChild(sc);col.appendChild(mt);col.appendChild(mb);ct.appendChild(col);
  var idx=PK.wheels.length;
  PK.wheels.push({sc:sc,val:vals[selIdx],vals:vals,selIdx:selIdx});
  setTimeout(function(){sc.scrollTop=selIdx*40},10);
  var db=null;
  sc.addEventListener("scroll",function(){clearTimeout(db);db=setTimeout(function(){
    var i=Math.round(sc.scrollTop/40);i=Math.max(0,Math.min(vals.length-1,i));
    sc.scrollTo({top:i*40,behavior:"smooth"});
    PK.wheels[idx].val=vals[i];PK.wheels[idx].selIdx=i;
    var items=sc.querySelectorAll(".wi");items.forEach(function(it){it.classList.remove("sel")});
    if(items[i+2])items[i+2].classList.add("sel");
    updPV();
  },60)});
}

function mkDigit(ct,sel){
  var vals=[];for(var i=0;i<=9;i++)vals.push(i);
  mkRange(ct,vals,sel,60);
}

function buildSign(ct,neg,field,val){
  var sgn=document.createElement("div");sgn.style.cssText="display:flex;flex-direction:column;gap:4px;align-self:center;margin-right:4px";
  var bp=document.createElement("button");bp.textContent="+";bp.style.cssText="width:30px;height:30px;border-radius:6px;font-size:18px;font-weight:700;border:1px solid "+(neg?"rgba(255,255,255,.1)":"rgba(129,178,154,.3)")+";background:"+(neg?"transparent":"rgba(129,178,154,.12)")+";color:"+(neg?"rgba(255,255,255,.3)":"#81b29a")+";cursor:pointer";
  var bm=document.createElement("button");bm.textContent="\u2212";bm.style.cssText="width:30px;height:30px;border-radius:6px;font-size:18px;font-weight:700;border:1px solid "+(neg?"rgba(224,122,95,.3)":"rgba(255,255,255,.1)")+";background:"+(neg?"rgba(224,122,95,.12)":"transparent")+";color:"+(neg?"#e07a5f":"rgba(255,255,255,.3)")+";cursor:pointer";
  bp.addEventListener("click",function(){PK.neg=false;var v=rdVal();openP(document.getElementById("ptt").textContent,field,v,PK.vi,PK.oi)});
  bm.addEventListener("click",function(){PK.neg=true;var v=rdVal();openP(document.getElementById("ptt").textContent,field,-v,PK.vi,PK.oi)});
  sgn.appendChild(bp);sgn.appendChild(bm);ct.appendChild(sgn);
}

function rdVal(){
  var f=PK.field,r=RANGE[f];
  if(r&&r.type==="range")return PK.wheels[0]?PK.wheels[0].val:0;
  if(r&&r.type==="rangef")return PK.wheels[0]?PK.wheels[0].val:0;
  if(r&&r.type==="dual"){var w=PK.wheels[0]?PK.wheels[0].val:0,d=PK.wheels[1]?PK.wheels[1].val:0;return w+d/100}
  // Digit fallback
  var cfg=CF[f]||{w:5,f:0},wn=cfg.w,fn=cfg.f,wv=0;
  for(var i=0;i<wn;i++)wv=wv*10+(PK.wheels[i]?PK.wheels[i].val:0);
  var fv=0;for(var i=0;i<fn;i++)fv=fv*10+(PK.wheels[wn+i]?PK.wheels[wn+i].val:0);
  return wv+fv/Math.pow(10,fn);
}

function updPV(){
  var val=rdVal(),f=PK.field,r=RANGE[f];
  var disp=PK.neg?"\u2212":"";
  if(r&&r.type==="dual")disp+=Math.abs(val).toFixed(2);
  else if(r&&r.type==="range")disp+=fm(Math.abs(val));
  else if(r&&r.type==="rangef"){var v2=Math.abs(val);disp+=v2==Math.floor(v2)?v2.toFixed(1):v2.toFixed(2)}
  else{var cfg=CF[f]||{w:5,f:0};disp+=cfg.f>0?Math.abs(val).toFixed(cfg.f):fm(Math.abs(val))}
  document.getElementById("ppv").textContent=disp;
}

document.getElementById("pdn").addEventListener("click",function(){
  var val=rdVal();if(PK.neg)val=-val;
  var f=PK.field,vi=PK.vi,oi=PK.oi;
  if(VF.indexOf(f)>=0)V[vi][f]=val;
  else if(f==="bb"){var op=V[vi].options[oi];if(Math.abs(val-aBB(op.hire))>.5){op.bb=val;op.bbOverride=true}else{op.bbOverride=false;op.bb=null}}
  else V[vi].options[oi][f]=val;
  document.getElementById("pov").classList.remove("show");render();
});

// Swipe-right numeric pad
var npField=null,npVi=0,npOi=0;
var swStartX=0,swStartY=0,swEl=null;
document.addEventListener("touchstart",function(e){
  var el=e.target.closest("[data-np]");
  if(!el){swEl=null;return}
  swEl=el;swStartX=e.touches[0].clientX;swStartY=e.touches[0].clientY;
},{passive:true});
document.addEventListener("touchend",function(e){
  if(!swEl)return;
  var dx=e.changedTouches[0].clientX-swStartX;
  var dy=Math.abs(e.changedTouches[0].clientY-swStartY);
  if(dx>60&&dy<40){
    // Swipe right detected
    var el=swEl;swEl=null;
    npField=el.dataset.npf;npVi=+el.dataset.npvi;npOi=+el.dataset.npoi;
    var cur=VF.indexOf(npField)>=0?V[npVi][npField]:V[npVi].options[npOi][npField];
    if(npField==="bb")cur=gBB(V[npVi].options[npOi]);
    document.getElementById("npadLbl").textContent=el.dataset.np;
    var inp=document.getElementById("npadInp");
    inp.value=cur;
    document.getElementById("npad").classList.add("show");
  }
  swEl=null;
},{passive:true});
